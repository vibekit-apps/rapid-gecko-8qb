<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Recipe Box</title>
<link rel="icon" href="https://vibekit.bot/public/favicon.ico" sizes="any">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f6f3ed;--fg:#1d1b18;--mute:#706b64;--soft:#8f867a;--card:#fffdf8;
  --border:#ded6ca;--accent:#b64232;--accent-dark:#8f3025;--accent-soft:#f2d8cf;
  --sage:#dce8dc;--sage-dark:#426b52;--gold:#d7a84a;--shadow:0 18px 48px rgba(58,43,28,.13);
  --radius:10px;
}
html{height:100%;scroll-behavior:smooth}
body{min-height:100vh;min-height:100dvh;background:
  radial-gradient(circle at top left, rgba(214,168,74,.13), transparent 32rem),
  linear-gradient(180deg,#fbfaf6 0%,var(--bg) 46%,#f2eee6 100%);
  color:var(--fg);font-family:Inter,ui-sans-serif,system-ui,-apple-system,'Segoe UI',sans-serif;-webkit-font-smoothing:antialiased;text-size-adjust:100%}
button,input,select{font:inherit}
button{touch-action:manipulation}

/* Layout */
.app{display:flex;min-height:100vh;min-height:100dvh}
.sidebar{width:268px;flex-shrink:0;background:rgba(255,253,248,.94);border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;height:100dvh;box-shadow:8px 0 32px rgba(87,68,45,.05);backdrop-filter:blur(12px)}
.main{flex:1;padding:2rem clamp(1.25rem,3vw,3rem);min-width:0}

/* Sidebar */
.sidebar-header{padding:1.35rem 1.15rem 1rem;border-bottom:1px solid var(--border)}
.sidebar-header h2{font-size:1.35rem;font-weight:800;line-height:1.05}
.sidebar-header span{display:block;font-size:.78rem;color:var(--soft);margin-top:.3rem}
.folder-list{flex:1;overflow-y:auto;padding:.7rem .65rem}
.folder-item{display:flex;align-items:center;gap:.55rem;min-height:44px;padding:.62rem .72rem;cursor:pointer;border-radius:9px;transition:background .12s,box-shadow .12s,color .12s;font-size:.9rem;color:var(--fg)}
.folder-item.nested{padding-left:calc(.72rem + (var(--depth,0) * 1rem))}
.folder-item.nested .folder-name::before{content:'';display:inline-block;width:.42rem;height:.42rem;border-left:1.5px solid var(--soft);border-bottom:1.5px solid var(--soft);margin-right:.4rem;transform:translateY(-.12rem);opacity:.75}
.folder-item:hover{background:#f0eadf}
.folder-item.active{background:var(--sage);box-shadow:inset 3px 0 0 var(--sage-dark);font-weight:700;color:#22372a}
.folder-item .folder-name{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.folder-item .count{font-size:.72rem;color:var(--soft);background:#f1eadf;padding:.12rem .45rem;border-radius:99px}
.folder-item.active .count{background:rgba(255,255,255,.7);color:#385442}
.folder-item .folder-actions{display:none;gap:.25rem}
.folder-item:hover .folder-actions{display:flex}
.folder-actions button{background:none;border:none;cursor:pointer;min-width:32px;min-height:32px;padding:3px 5px;border-radius:5px;color:var(--mute);font-size:.75rem}
.folder-actions button:hover{background:#e5e1da;color:var(--fg)}
@media (hover:none){.folder-item .folder-actions{display:flex}}
.new-folder-btn{margin:.85rem 1rem 1rem;display:flex;align-items:center;justify-content:center;gap:.5rem;min-height:44px;padding:.6rem .875rem;background:var(--fg);color:#fff;border:none;border-radius:var(--radius);font-size:.84rem;font-weight:700;cursor:pointer;width:calc(100% - 2rem);box-shadow:0 10px 22px rgba(29,27,24,.16)}
.new-folder-btn:hover{background:#38322d}

/* Main header */
.main-header{display:grid;grid-template-columns:minmax(0,1fr) minmax(240px,360px) auto;align-items:end;gap:1rem;margin-bottom:1.6rem}
.main-header h1{font-size:clamp(1.8rem,3vw,2.65rem);font-weight:850;line-height:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.search-tools{display:flex;flex-direction:column;gap:.4rem;min-width:0}
.search-toggle-row{display:flex;justify-content:flex-end;gap:.45rem;flex-wrap:wrap}
.search-mode-toggle,.search-scope-toggle{display:inline-flex;border:1px solid var(--border);border-radius:9px;background:rgba(255,253,248,.82);overflow:hidden;box-shadow:0 4px 12px rgba(70,55,36,.05)}
.search-mode-toggle button,.search-scope-toggle button{min-height:32px;padding:.35rem .7rem;border:none;background:transparent;color:var(--mute);font-size:.75rem;font-weight:700;cursor:pointer}
.search-mode-toggle button.active,.search-scope-toggle button.active{background:var(--sage);color:#243c2c}
.search-mode-toggle button:disabled,.search-scope-toggle button:disabled{opacity:.45;cursor:not-allowed}
.search-mode-toggle button:focus-visible,.search-scope-toggle button:focus-visible{outline:2px solid var(--accent);outline-offset:-2px}
.search-box{position:relative}
.search-input{width:100%;min-height:46px;padding:.72rem .95rem;border:1px solid var(--border);border-radius:9px;background:#fffdf8;color:var(--fg);font-size:.9rem;box-shadow:0 8px 24px rgba(70,55,36,.06)}
.search-input.has-value{padding-right:2.7rem}
.search-input:focus{outline:3px solid rgba(182,66,50,.18);border-color:var(--accent)}
.clear-search{position:absolute;right:.35rem;top:50%;transform:translateY(-50%);width:34px;height:34px;border:none;border-radius:8px;background:transparent;color:var(--mute);cursor:pointer;font-size:1.05rem;display:none}
.clear-search.visible{display:block}
.clear-search:hover{background:#efe7dc;color:var(--fg)}
.upload-btn{display:inline-flex;align-items:center;justify-content:center;gap:.5rem;min-height:46px;padding:.72rem 1.1rem;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);font-size:.9rem;font-weight:750;cursor:pointer;white-space:nowrap;box-shadow:0 12px 24px rgba(182,66,50,.22)}
.upload-btn:hover{background:var(--accent-dark)}
.upload-btn svg{width:16px;height:16px}
/* Grid */
.recipe-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:1.05rem}
.recipe-card{background:var(--card);border:1px solid rgba(222,214,202,.92);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:box-shadow .16s,transform .16s,border-color .16s;position:relative;box-shadow:0 8px 22px rgba(70,55,36,.07)}
.recipe-card:hover{box-shadow:var(--shadow);transform:translateY(-3px);border-color:#cbbba7}
.recipe-card .photo-wrap{position:relative;overflow:hidden;background:#e9e1d5;aspect-ratio:4/3}
.recipe-card img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .18s ease}
.recipe-card:hover .photo-wrap img{transform:scale(1.06)}
.photo-zoom-icon{position:absolute;left:.55rem;bottom:.55rem;width:34px;height:34px;border:1px solid rgba(255,255,255,.7);border-radius:50%;background:rgba(29,27,24,.68);color:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 18px rgba(0,0,0,.22);pointer-events:none}
.photo-zoom-icon svg{width:17px;height:17px}
.recipe-card .card-body{padding:.82rem .85rem .9rem}
.recipe-card .card-name{font-size:.95rem;font-weight:760;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.recipe-card .card-date{font-size:.74rem;color:var(--soft);margin-top:.28rem}
.recipe-card .card-meta{font-size:.74rem;color:var(--mute);margin-top:.32rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.recipe-card mark{background:#ffe08a;color:inherit;border-radius:3px;padding:0 .08rem}
.recipe-card .card-menu{position:absolute;top:.5rem;right:.5rem;opacity:0;transition:opacity .15s;display:flex;gap:.25rem}
.recipe-card:hover .card-menu{opacity:1}
.card-menu button{background:rgba(255,253,248,.94);border:1px solid rgba(222,214,202,.7);border-radius:8px;min-width:34px;min-height:34px;padding:4px 7px;cursor:pointer;font-size:.75rem;color:var(--fg);box-shadow:0 4px 14px rgba(0,0,0,.16)}
.card-menu button:hover{background:#fff}
@media (hover:none){.recipe-card .card-menu{opacity:1}}

/* Empty */
.empty{text-align:center;padding:4.2rem 2rem;color:var(--mute);background:rgba(255,253,248,.62);border:1px dashed #d7ccbe;border-radius:14px}
.empty svg{width:48px;height:48px;margin:0 auto 1rem;opacity:.35}
.empty p{font-size:.9375rem}
.empty h2{font-size:1.15rem;color:var(--fg);margin-bottom:.35rem}
.empty .empty-actions{display:flex;justify-content:center;gap:.6rem;flex-wrap:wrap;margin-top:1.1rem}
.empty .btn{display:inline-flex;align-items:center;justify-content:center}

/* Modals */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:100;display:flex;align-items:center;justify-content:center;padding:1rem}
.overlay.hidden{display:none}
.modal{background:#fffdf8;border:1px solid rgba(255,255,255,.55);border-radius:16px;padding:1.75rem;width:100%;max-width:440px;max-height:calc(100dvh - 2rem);overflow:auto;box-shadow:0 28px 80px rgba(0,0,0,.28)}
.modal h3{font-size:1.2rem;font-weight:800;margin-bottom:1.25rem}
.modal label{display:block;font-size:.8125rem;font-weight:600;color:var(--mute);margin-bottom:.375rem;margin-top:.875rem}
.modal label:first-of-type{margin-top:0}
.modal input,.modal select{width:100%;min-height:44px;padding:.625rem .875rem;border:1px solid var(--border);border-radius:8px;font-size:1rem;background:#fff;color:var(--fg)}
.modal input:focus,.modal select:focus{outline:3px solid rgba(182,66,50,.18);border-color:var(--accent)}
.upload-area{border:2px dashed #cbbba7;border-radius:12px;min-height:164px;padding:2rem 1rem;text-align:center;cursor:pointer;transition:border-color .15s,background .15s; background:#f8f3ea;margin-top:.25rem;display:flex;flex-direction:column;align-items:center;justify-content:center}
.upload-area:hover,.upload-area.drag{border-color:var(--accent);background:#fff4ee}
.upload-area img{max-height:180px;max-width:100%;border-radius:8px;margin-top:.75rem}
.upload-area p{font-size:.8125rem;color:var(--mute)}
.upload-mark{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:#fff;border:1px solid var(--border);color:var(--accent);font-weight:800;font-size:1.45rem;margin-bottom:.7rem;box-shadow:0 8px 18px rgba(70,55,36,.08)}
.modal-actions{display:flex;gap:.75rem;justify-content:flex-end;margin-top:1.5rem}
.btn{min-height:44px;padding:.6rem 1.1rem;border-radius:8px;font-size:.875rem;font-weight:600;cursor:pointer;border:none}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent-dark)}
.btn-secondary{background:#efe7dc;color:var(--fg)}
.btn-secondary:hover{background:#e5e1da}
.btn-danger{background:#fee2e2;color:#991b1b}
.btn-danger:hover{background:#fecaca}

/* Lightbox */
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:200;display:flex;align-items:center;justify-content:center;padding:1rem}
.lightbox.hidden{display:none}
.recipe-detail{width:min(1100px,100%);max-height:92vh;max-height:92dvh;display:grid;grid-template-columns:minmax(0,1.1fr) minmax(300px,.9fr);gap:1rem;align-items:stretch;overflow:hidden}
.lightbox-photo{position:relative;overflow:hidden;border-radius:10px;background:#111;cursor:zoom-in;min-height:0}
.lightbox-photo img{width:100%;height:100%;max-height:92vh;max-height:92dvh;object-fit:contain;display:block;transform-origin:var(--zoom-x,50%) var(--zoom-y,50%);transition:transform .16s ease}
.lightbox-photo:hover img{transform:scale(1.85)}
.recipe-text-panel{background:#fffdf8;color:var(--fg);border-radius:10px;padding:1.15rem;min-height:0;max-height:92vh;max-height:92dvh;overflow-y:auto;overscroll-behavior:contain;-webkit-overflow-scrolling:touch}
.recipe-detail-head{display:flex;align-items:flex-start;gap:.75rem;justify-content:space-between;margin-bottom:.75rem}
.recipe-detail-head h2{font-size:1.25rem;line-height:1.15;margin:0;min-width:0;overflow-wrap:anywhere}
.recipe-detail-actions{display:flex;gap:.45rem;flex-shrink:0}
.recipe-detail-actions .btn{min-height:36px;padding:.45rem .7rem;font-size:.78rem}
.recipe-text-panel h2{font-size:1.25rem;line-height:1.15;margin-bottom:.75rem}
.recipe-text-panel h3{font-size:.8rem;text-transform:uppercase;color:var(--mute);margin:1rem 0 .4rem;letter-spacing:.04em}
.recipe-text-panel ul,.recipe-text-panel ol{padding-left:1.2rem;font-size:.9rem;line-height:1.45}
.recipe-text-panel li+li{margin-top:.25rem}
.recipe-text-panel pre{white-space:pre-wrap;font:inherit;font-size:.85rem;line-height:1.45;color:#374151;background:#faf8f5;border:1px solid var(--border);border-radius:8px;padding:.75rem}
.recipe-empty-text{font-size:.9rem;color:var(--mute)}
.recipe-edit-form{display:flex;flex-direction:column;gap:.75rem}
.recipe-edit-form label{display:flex;flex-direction:column;gap:.3rem;font-size:.78rem;font-weight:750;color:var(--mute);text-transform:uppercase;letter-spacing:.035em}
.recipe-edit-form input,.recipe-edit-form textarea{width:100%;border:1px solid var(--border);border-radius:8px;background:#fff;color:var(--fg);font:inherit;font-size:.9rem;padding:.65rem .75rem;text-transform:none;letter-spacing:0}
.recipe-edit-form textarea{min-height:116px;resize:vertical;line-height:1.4}
.recipe-edit-form textarea.full-text{min-height:190px}
.recipe-edit-form input:focus,.recipe-edit-form textarea:focus{outline:3px solid rgba(182,66,50,.18);border-color:var(--accent)}
.recipe-edit-actions{display:flex;gap:.6rem;justify-content:flex-end;position:sticky;bottom:-1.15rem;background:#fffdf8;padding:.75rem 0 0;margin-top:.25rem}
.lightbox-close{position:absolute;top:calc(1rem + env(safe-area-inset-top));right:calc(1rem + env(safe-area-inset-right));background:rgba(255,255,255,.15);border:none;color:#fff;font-size:1.5rem;width:44px;height:44px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:2}
.lightbox-close:hover{background:rgba(255,255,255,.3)}

/* Responsive */
@media(hover:hover) and (pointer:fine){
  .lightbox-photo:hover .photo-zoom-icon{opacity:0}
}
@media(max-width:840px){
  .main-header{grid-template-columns:1fr auto}
  .main-header h1{grid-column:1/-1}
  .search-tools{grid-column:1/2}
}
@media(max-width:700px){
  .app{flex-direction:column}
  .sidebar{width:100%;height:auto;position:sticky;z-index:20;border-right:none;border-bottom:1px solid var(--border)}
  .sidebar-header{padding:.85rem 1rem .55rem}
  .sidebar-header h2{font-size:1rem}
  .folder-list{display:flex;gap:.5rem;overflow-x:auto;overflow-y:hidden;max-height:none;padding:.65rem 1rem .75rem;scroll-padding:1rem;-webkit-overflow-scrolling:touch}
  .folder-list::-webkit-scrollbar{display:none}
  .folder-item{flex:0 0 auto;max-width:220px;border:1px solid var(--border);border-radius:999px;background:#fffdf8;padding:.45rem .75rem;box-shadow:none}
  .folder-item.nested{padding-left:.75rem}
  .folder-item.nested .folder-name::before{width:.35rem;height:.35rem;margin-right:.3rem}
  .folder-item.active{border-color:#d3b88d}
  .folder-item .folder-name{max-width:140px}
  .folder-item .folder-actions{display:none}
  .new-folder-btn{position:absolute;top:.65rem;right:1rem;width:auto;margin:0;min-height:38px;padding:.45rem .7rem;border-radius:999px}
  .main{padding:1rem;min-height:0}
  .main-header{grid-template-columns:1fr;gap:.75rem;margin-bottom:1rem}
  .main-header h1{grid-column:auto;font-size:1.25rem;white-space:normal}
  .search-tools{grid-column:auto}
  .upload-btn{width:100%}
  .recipe-grid{grid-template-columns:repeat(auto-fill,minmax(min(150px,100%),1fr));gap:.75rem}
  .recipe-card:hover{transform:none}
  .recipe-card .card-body{padding:.65rem}
  .recipe-card .card-name{white-space:normal;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;min-height:2.25rem}
  .empty{padding:3rem 1rem}
  .overlay{align-items:flex-end;padding:0}
  .modal{max-width:none;max-height:min(92dvh,720px);border-radius:18px 18px 0 0;padding:1.25rem 1rem calc(1rem + env(safe-area-inset-bottom))}
  .modal-actions{position:sticky;bottom:-1rem;background:#fffdf8;padding-top:.75rem;margin-left:-1rem;margin-right:-1rem;padding-left:1rem;padding-right:1rem}
  .modal-actions .btn{flex:1}
  .lightbox{align-items:flex-start;overflow:auto;padding:calc(3.75rem + env(safe-area-inset-top)) .75rem calc(.75rem + env(safe-area-inset-bottom))}
  .recipe-detail{grid-template-columns:1fr;width:100%;max-height:none;overflow:visible;gap:.75rem}
  .lightbox-photo{border-radius:8px}
  .lightbox-photo img{height:auto;max-height:42dvh}
  .lightbox-photo:hover img{transform:none}
  .recipe-text-panel{max-height:45dvh;border-radius:8px;padding:.9rem}
  .recipe-text-panel h2,.recipe-detail-head h2{font-size:1rem}
  .recipe-text-panel ul,.recipe-text-panel ol{font-size:.92rem}
  .recipe-detail-head{align-items:center}
  .recipe-detail-actions .btn{min-height:34px}
}
@media(max-width:380px){
  .recipe-grid{grid-template-columns:1fr}
  .folder-item{max-width:180px}
  .folder-item .folder-name{max-width:105px}
}
</style>
</head>
<body>
<div class="app">
  <!-- Sidebar -->
  <nav class="sidebar">
    <div class="sidebar-header">
      <h2>Recipe Box</h2>
      <span>Your recipe collection</span>
    </div>
    <div class="folder-list" id="folderList"></div>
    <button class="new-folder-btn" onclick="openNewFolder()">+ New Folder</button>
  </nav>

  <!-- Main -->
  <main class="main">
    <div class="main-header">
      <h1 id="mainTitle">All Recipes</h1>
      <div class="search-tools">
        <div class="search-toggle-row">
          <div class="search-mode-toggle" role="group" aria-label="Search by">
            <button type="button" class="active" id="recipeSearchModeButton" aria-pressed="true" onclick="setSearchMode('recipe')">Recipes</button>
            <button type="button" id="ingredientSearchModeButton" aria-pressed="false" onclick="setSearchMode('ingredients')">Ingredients</button>
          </div>
          <div class="search-scope-toggle" role="group" aria-label="Search scope">
            <button type="button" class="active" id="searchAllButton" aria-pressed="true" onclick="setSearchScope('all')">All folders</button>
            <button type="button" id="searchFolderButton" aria-pressed="false" onclick="setSearchScope('folder')">Current folder</button>
          </div>
        </div>
        <div class="search-box">
          <input class="search-input" id="recipeSearchInput" type="search" placeholder="Search recipes" autocomplete="off">
          <button type="button" class="clear-search" id="clearSearchButton" aria-label="Clear search" onclick="clearSearch()">&#x2715;</button>
        </div>
      </div>
      <button class="upload-btn" onclick="openAddRecipe()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Add Photo
      </button>
    </div>
    <div class="recipe-grid" id="recipeGrid"></div>
  </main>
</div>

<!-- New/Edit Folder Modal -->
<div class="overlay hidden" id="folderModal">
  <div class="modal">
    <h3 id="folderModalTitle">New Folder</h3>
    <label>Folder Name</label>
    <input type="text" id="folderNameInput" placeholder="e.g. Desserts" maxlength="60">
    <label>Inside</label>
    <select id="folderParentSelect"></select>
    <div class="modal-actions">
      <button type="button" class="btn btn-secondary" onclick="closeModal('folderModal')">Cancel</button>
      <button type="button" class="btn btn-primary" id="folderSaveButton">Save</button>
    </div>
  </div>
</div>

<!-- Add Recipe Modal -->
<div class="overlay hidden" id="recipeModal">
  <div class="modal">
    <h3>Add Recipe Photos</h3>
    <label>Photos</label>
    <div class="upload-area" id="uploadArea" onclick="document.getElementById('photoInput').click()"
         ondragover="handleDragOver(event)"
         ondragleave="this.classList.remove('drag')"
         ondrop="handleDrop(event)">
      <div class="upload-mark">+</div>
      <p>Tap to take photos or choose from library</p>
      <img id="photoPreview" style="display:none">
    </div>
    <input type="file" id="photoInput" accept="image/*" capture="environment" multiple style="display:none" onchange="handleFiles(this.files)">
    <label>Recipe Name</label>
    <input type="text" id="recipeNameInput" placeholder="e.g. Grandma's Chocolate Cake" maxlength="80">
    <label>Folder</label>
    <div style="display:flex;gap:.5rem;align-items:center">
      <select id="recipeFolderSelect" style="flex:1"></select>
      <button type="button" class="btn btn-secondary" style="white-space:nowrap;padding:.6rem .75rem;font-size:.8rem" onclick="toggleInlineNewFolder()">+ New</button>
    </div>
    <div id="inlineNewFolder" style="display:none;margin-top:.5rem">
      <input type="text" id="inlineFolderName" placeholder="Folder name" maxlength="60" style="width:100%">
      <div style="display:flex;gap:.5rem;margin-top:.5rem;justify-content:flex-end">
        <button type="button" class="btn btn-secondary" onclick="cancelInlineFolder()">Cancel</button>
        <button type="button" class="btn btn-primary" onclick="createInlineFolder()">Create</button>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal('recipeModal')">Cancel</button>
      <button class="btn btn-primary" id="recipeSaveButton" onclick="saveRecipe()">Save</button>
    </div>
  </div>
</div>

<!-- Move Recipe Modal -->
<div class="overlay hidden" id="moveModal">
  <div class="modal">
    <h3>Move Recipe</h3>
    <label>Move to Folder</label>
    <select id="moveFolderSelect"></select>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal('moveModal')">Cancel</button>
      <button class="btn btn-primary" onclick="moveRecipe()">Move</button>
    </div>
  </div>
</div>

<!-- Rename Recipe Modal -->
<div class="overlay hidden" id="renameModal">
  <div class="modal">
    <h3>Rename Recipe</h3>
    <label>Name</label>
    <input type="text" id="renameInput" maxlength="80">
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal('renameModal')">Cancel</button>
      <button class="btn btn-primary" onclick="doRename()">Save</button>
    </div>
  </div>
</div>

<!-- Lightbox -->
<div class="lightbox hidden" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">&#x2715;</button>
  <div class="recipe-detail" onclick="event.stopPropagation()">
    <div class="lightbox-photo" id="lightboxPhoto">
      <img id="lightboxImg">
      <span class="photo-zoom-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m16.5 16.5 4 4"/></svg>
      </span>
    </div>
    <section class="recipe-text-panel" id="recipeTextPanel"></section>
  </div>
</div>

<script>
let folders = [];
let recipes = [];
let activeFolderId = 'all'; // 'all' or folder id
let editingFolderId = null;
let savingFolder = false;
let pendingMoveId = null;
let pendingRenameId = null;
let selectedFiles = [];
let searchQuery = '';
let searchMode = 'recipe';
let searchScope = 'all';
let searchResults = null;
let searchLoading = false;
let searchError = '';
let searchTimer = null;
let searchRequestId = 0;
let activeRecipeDetailId = null;
let savingRecipeEdits = false;

const folderNameCollator = new Intl.Collator(undefined, { sensitivity: 'base', numeric: true });

function getSortedFolders() {
  return [...folders].sort((a, b) => {
    const byName = folderNameCollator.compare(a.name || '', b.name || '');
    return byName || String(a.id || '').localeCompare(String(b.id || ''));
  });
}

function getFolderTree(parentId = null, depth = 0, seen = new Set()) {
  return getSortedFolders()
    .filter(folder => (folder.parentId || null) === (parentId || null))
    .flatMap(folder => {
      if (seen.has(folder.id)) return [];
      const nextSeen = new Set(seen);
      nextSeen.add(folder.id);
      return [
        { ...folder, depth },
        ...getFolderTree(folder.id, depth + 1, nextSeen)
      ];
    });
}

function getDescendantFolderIds(folderId) {
  const ids = new Set([folderId]);
  let changed = true;
  while (changed) {
    changed = false;
    folders.forEach(folder => {
      if (folder.parentId && ids.has(folder.parentId) && !ids.has(folder.id)) {
        ids.add(folder.id);
        changed = true;
      }
    });
  }
  return ids;
}

function getFolderRecipeCount(folderId) {
  const ids = getDescendantFolderIds(folderId);
  return recipes.filter(r => r.folderId && ids.has(r.folderId)).length;
}

function folderPathLabel(folder) {
  const names = [];
  let current = folder;
  const seen = new Set();
  while (current && !seen.has(current.id)) {
    seen.add(current.id);
    names.unshift(current.name);
    current = folders.find(f => f.id === current.parentId);
  }
  return names.join(' / ');
}

function folderOptionHtml(selectedId = '', excludedId = null) {
  const excluded = excludedId ? getDescendantFolderIds(excludedId) : new Set();
  if (excludedId) excluded.add(excludedId);
  return '<option value="">Top level</option>' + getFolderTree()
    .filter(folder => !excluded.has(folder.id))
    .map(folder => `<option value="${folder.id}" ${selectedId===folder.id?'selected':''}>${'--'.repeat(folder.depth)} ${esc(folder.name)}</option>`)
    .join('');
}

function recipeFolderOptionHtml(selectedId = '') {
  return '<option value="">Unorganized</option>' + getFolderTree()
    .map(folder => `<option value="${folder.id}" ${selectedId===folder.id?'selected':''}>${'--'.repeat(folder.depth)} ${esc(folder.name)}</option>`)
    .join('');
}

function getSearchTerms() {
  return searchQuery.toLowerCase().trim().split(/\s+/).filter(Boolean);
}

function setSearchMode(mode) {
  searchMode = mode === 'ingredients' ? 'ingredients' : 'recipe';
  updateSearchModeButtons();
  runSearch();
}

function updateSearchModeButtons() {
  const recipeButton = document.getElementById('recipeSearchModeButton');
  const ingredientButton = document.getElementById('ingredientSearchModeButton');
  const searchInput = document.getElementById('recipeSearchInput');
  recipeButton.classList.toggle('active', searchMode === 'recipe');
  ingredientButton.classList.toggle('active', searchMode === 'ingredients');
  recipeButton.setAttribute('aria-pressed', String(searchMode === 'recipe'));
  ingredientButton.setAttribute('aria-pressed', String(searchMode === 'ingredients'));
  searchInput.placeholder = searchMode === 'ingredients' ? 'Search ingredients' : 'Search recipes';
}

function setSearchScope(scope) {
  searchScope = scope === 'folder' ? 'folder' : 'all';
  updateSearchScopeButtons();
  runSearch();
}

function updateSearchScopeButtons() {
  const allButton = document.getElementById('searchAllButton');
  const folderButton = document.getElementById('searchFolderButton');
  const canFilterFolder = activeFolderId !== 'all';
  if (!canFilterFolder && searchScope === 'folder') searchScope = 'all';
  allButton.classList.toggle('active', searchScope === 'all');
  folderButton.classList.toggle('active', searchScope === 'folder');
  allButton.setAttribute('aria-pressed', String(searchScope === 'all'));
  folderButton.setAttribute('aria-pressed', String(searchScope === 'folder'));
  folderButton.disabled = !canFilterFolder;
}

function getSearchFolderId() {
  return searchScope === 'folder' && activeFolderId !== 'all' ? activeFolderId : '';
}

function scheduleSearch() {
  window.clearTimeout(searchTimer);
  searchTimer = window.setTimeout(runSearch, 180);
}

async function runSearch() {
  const query = searchQuery.trim();
  if (!query) {
    searchResults = null;
    searchLoading = false;
    searchError = '';
    renderGrid();
    return;
  }

  const requestId = ++searchRequestId;
  searchLoading = true;
  searchError = '';
  renderGrid();
  try {
    const params = new URLSearchParams({ search: query, mode: searchMode });
    const folderId = getSearchFolderId();
    if (folderId) params.set('folderId', folderId);
    const response = await fetch(`/api/recipes?${params.toString()}`);
    const results = await readApiResponse(response);
    if (requestId !== searchRequestId) return;
    searchResults = results;
  } catch (e) {
    if (requestId !== searchRequestId) return;
    searchResults = [];
    searchError = e.message;
  } finally {
    if (requestId === searchRequestId) {
      searchLoading = false;
      renderGrid();
    }
  }
}

function refreshSearchOrRender() {
  if (searchQuery.trim()) runSearch();
  else render();
}

async function init() {
  [folders, recipes] = await Promise.all([
    fetch('/api/folders').then(r => r.json()),
    fetch('/api/recipes').then(r => r.json())
  ]);
  folders = getSortedFolders();
  render();
}

async function readApiResponse(response) {
  const contentType = response.headers.get('content-type') || '';
  const payload = contentType.includes('application/json')
    ? await response.json()
    : await response.text();

  if (response.ok) return payload;

  const message = typeof payload === 'object' && payload && payload.error
    ? payload.error
    : typeof payload === 'string'
      ? payload.replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ').trim().slice(0, 180)
      : '';

  throw new Error(message || `Request failed (${response.status})`);
}

function render() {
  renderSidebar();
  renderGrid();
}

function getVisibleRecipes() {
  if (activeFolderId === 'none') return recipes.filter(r => !r.folderId);
  if (activeFolderId !== 'all') {
    const folderIds = getDescendantFolderIds(activeFolderId);
    return recipes.filter(r => r.folderId && folderIds.has(r.folderId));
  }
  return recipes;
}

function escapeRegExp(value) {
  return String(value).replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

function highlightMatches(value, terms) {
  const text = String(value || '');
  if (!terms.length || !text) return esc(text);
  const pattern = terms.map(escapeRegExp).filter(Boolean).join('|');
  if (!pattern) return esc(text);
  return esc(text).replace(new RegExp(`(${pattern})`, 'gi'), '<mark>$1</mark>');
}

function searchSnippet(recipe, terms) {
  const sources = [
    { label: 'Name', text: recipe.name || '' },
    { label: 'Ingredients', text: Array.isArray(recipe.ingredients) ? recipe.ingredients.join(' / ') : '' },
    { label: 'Steps', text: Array.isArray(recipe.steps) ? recipe.steps.join(' / ') : '' },
    { label: 'Text', text: recipe.ocrText || '' }
  ];
  const match = sources.find(source => {
    const lower = source.text.toLowerCase();
    return terms.some(term => lower.includes(term));
  });
  if (!match) return 'Matched scanned recipe text';

  const lower = match.text.toLowerCase();
  const firstIndex = terms
    .map(term => lower.indexOf(term))
    .filter(index => index >= 0)
    .sort((a, b) => a - b)[0] || 0;
  const start = Math.max(0, firstIndex - 36);
  const end = Math.min(match.text.length, firstIndex + 96);
  const prefix = start > 0 ? '...' : '';
  const suffix = end < match.text.length ? '...' : '';
  const snippet = `${prefix}${match.text.slice(start, end).replace(/\s+/g, ' ')}${suffix}`;
  return `${esc(match.label)}: ${highlightMatches(snippet, terms)}`;
}

function renderSidebar() {
  const list = document.getElementById('folderList');
  const allCount = recipes.length;
  const noneCount = recipes.filter(r => !r.folderId).length;

  let html = `
    <div class="folder-item ${activeFolderId==='all'?'active':''}" onclick="setFolder('all')">
      <span class="folder-name">All Recipes</span>
      <span class="count">${allCount}</span>
    </div>
  `;

  const sidebarFolders = [
    { id: 'none', name: 'Unorganized', count: noneCount, builtIn: true, depth: 0 },
    ...getFolderTree().map(f => ({
      ...f,
      count: getFolderRecipeCount(f.id),
      builtIn: false
    }))
  ];

  sidebarFolders.forEach(f => {
    html += `
      <div class="folder-item ${f.depth ? 'nested' : ''} ${activeFolderId===f.id?'active':''}" style="--depth:${f.depth || 0}" onclick="setFolder('${f.id}')">
        <span class="folder-name">${esc(f.name)}</span>
        <span class="count">${f.count}</span>
        ${f.builtIn ? '' : `<div class="folder-actions">
          <button onclick="event.stopPropagation();openNewFolder('${f.id}')" title="Add subfolder">+</button>
          <button onclick="event.stopPropagation();openEditFolder('${f.id}')" title="Rename">&#9998;</button>
          <button onclick="event.stopPropagation();deleteFolder('${f.id}')" title="Delete">&#x2715;</button>
        </div>`}
      </div>`;
  });
  list.innerHTML = html;
}

function renderGrid() {
  const grid = document.getElementById('recipeGrid');
  const title = document.getElementById('mainTitle');
  const searchInput = document.getElementById('recipeSearchInput');
  const clearButton = document.getElementById('clearSearchButton');
  const searchTerms = getSearchTerms();
  let visible;
  updateSearchModeButtons();
  updateSearchScopeButtons();
  searchInput.classList.toggle('has-value', Boolean(searchQuery.trim()));
  clearButton.classList.toggle('visible', Boolean(searchQuery.trim()));
  if (searchTerms.length) {
    visible = searchResults || [];
    const scoped = getSearchFolderId();
    const modeLabel = searchMode === 'ingredients' ? 'Ingredient' : 'Recipe';
    title.textContent = scoped ? `${modeLabel} Folder Search` : `${modeLabel} Search`;
  } else if (activeFolderId === 'all') {
    visible = recipes; title.textContent = 'All Recipes';
  } else if (activeFolderId === 'none') {
    visible = recipes.filter(r => !r.folderId); title.textContent = 'Unorganized';
  } else {
    const f = folders.find(x => x.id === activeFolderId);
    const folderIds = getDescendantFolderIds(activeFolderId);
    visible = recipes.filter(r => r.folderId && folderIds.has(r.folderId));
    title.textContent = f ? folderPathLabel(f) : 'Folder';
  }

  if (searchLoading) {
    grid.innerHTML = `<div class="empty" style="grid-column:1/-1">
      <h2>Searching</h2>
      <p>${searchMode === 'ingredients' ? 'Checking extracted ingredients.' : 'Checking recipe names and scanned text.'}</p>
    </div>`;
    return;
  }

  if (!visible.length) {
    const emptyTitle = searchError ? 'Search Failed' : searchTerms.length ? 'No Matches' : 'Start Your Recipe Box';
    const emptyText = searchTerms.length
      ? (searchError || 'Try a broader search or switch between recipe and ingredient search.')
      : 'Save a photo, keep it in a folder, and the app will pull out recipe text when it can.';
    const actions = searchTerms.length
      ? `<button class="btn btn-secondary" onclick="clearSearch()">Clear Search</button>`
      : `<button class="btn btn-primary" onclick="openAddRecipe()">Add Photo</button><button class="btn btn-secondary" onclick="openNewFolder()">New Folder</button>`;
    grid.innerHTML = `<div class="empty" style="grid-column:1/-1">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="m9 9 6 6M15 9l-6 6"/></svg>
      <h2>${emptyTitle}</h2>
      <p>${emptyText}</p>
      <div class="empty-actions">${actions}</div>
    </div>`;
    return;
  }

  grid.innerHTML = visible.map(r => `
    <div class="recipe-card" onclick="openRecipe('${r.id}')">
      <div class="photo-wrap">
        <img src="/uploads/${r.filename}" alt="${esc(r.name)}" loading="lazy">
        <span class="photo-zoom-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m16.5 16.5 4 4"/></svg>
        </span>
      </div>
      <div class="card-menu">
        <button onclick="event.stopPropagation();openRename('${r.id}','${esc(r.name)}')" title="Rename">&#9998;</button>
        <button onclick="event.stopPropagation();openMove('${r.id}')" title="Move">&#10137;</button>
        <button onclick="event.stopPropagation();deleteRecipe('${r.id}')" title="Delete">&#x2715;</button>
      </div>
      <div class="card-body">
        <div class="card-name">${highlightMatches(r.name, searchTerms)}</div>
        <div class="card-date">${new Date(r.createdAt).toLocaleDateString()}</div>
        ${searchTerms.length ? `<div class="card-meta">${searchSnippet(r, searchTerms)}</div>` : Array.isArray(r.ingredients) && r.ingredients.length ? `<div class="card-meta">${esc(r.ingredients.slice(0, 2).join(' / '))}</div>` : ''}
        ${r.ocrStatus === 'failed' ? '<div class="card-meta">Text scan failed</div>' : ''}
      </div>
    </div>`).join('');
}

function setFolder(id) {
  activeFolderId = id;
  if (activeFolderId === 'all' && searchScope === 'folder') searchScope = 'all';
  refreshSearchOrRender();
}

function clearSearch() {
  searchQuery = '';
  searchResults = null;
  searchError = '';
  document.getElementById('recipeSearchInput').value = '';
  render();
}

// Folder CRUD
function openNewFolder(parentId = null) {
  editingFolderId = null;
  document.getElementById('folderModalTitle').textContent = 'New Folder';
  document.getElementById('folderNameInput').value = '';
  document.getElementById('folderParentSelect').innerHTML = folderOptionHtml(parentId || '');
  document.getElementById('folderSaveButton').disabled = false;
  document.getElementById('folderSaveButton').textContent = 'Save';
  openModal('folderModal');
  document.getElementById('folderNameInput').focus();
}
function openEditFolder(id) {
  const f = folders.find(x => x.id === id);
  if (!f) return;
  editingFolderId = id;
  document.getElementById('folderModalTitle').textContent = 'Rename Folder';
  document.getElementById('folderNameInput').value = f.name;
  document.getElementById('folderParentSelect').innerHTML = folderOptionHtml(f.parentId || '', id);
  document.getElementById('folderSaveButton').disabled = false;
  document.getElementById('folderSaveButton').textContent = 'Save';
  openModal('folderModal');
  document.getElementById('folderNameInput').focus();
  document.getElementById('folderNameInput').select();
}
async function saveFolder() {
  if (savingFolder) return;
  const name = document.getElementById('folderNameInput').value.trim();
  if (!name) return;
  const parentId = document.getElementById('folderParentSelect').value || null;
  const folderId = editingFolderId;
  const saveButton = document.getElementById('folderSaveButton');
  savingFolder = true;
  saveButton.disabled = true;
  saveButton.textContent = 'Saving...';
  try {
    if (folderId) {
      const r = await fetch(`/api/folders/${folderId}?name=${encodeURIComponent(name)}&parentId=${encodeURIComponent(parentId || '')}`, { method:'POST' });
      const f = await readApiResponse(r);
      const idx = folders.findIndex(x => x.id === folderId);
      if (idx >= 0) folders[idx] = f;
      folders = getSortedFolders();
      if (activeFolderId === folderId) document.getElementById('mainTitle').textContent = folderPathLabel(f);
    } else {
      const r = await fetch(`/api/folders?name=${encodeURIComponent(name)}&parentId=${encodeURIComponent(parentId || '')}`, { method:'POST' });
      folders.push(await readApiResponse(r));
      folders = getSortedFolders();
    }
    closeModal('folderModal');
    editingFolderId = null;
    refreshSearchOrRender();
  } catch (e) {
    alert('Could not save folder: ' + e.message);
  } finally {
    savingFolder = false;
    saveButton.disabled = false;
    saveButton.textContent = 'Save';
  }
}
async function deleteFolder(id) {
  if (!confirm('Delete folder? Recipes inside will move to Unorganized.')) return;
  try {
    const response = await fetch(`/api/folders/${id}`, { method:'DELETE' });
    await readApiResponse(response);
    const deleted = folders.find(x => x.id === id);
    folders = folders.filter(x => x.id !== id);
    folders.forEach(f => { if (f.parentId === id) f.parentId = deleted?.parentId || null; });
    recipes.forEach(r => { if (r.folderId === id) r.folderId = null; });
    if (activeFolderId === id) activeFolderId = 'all';
    refreshSearchOrRender();
  } catch (e) {
    alert('Could not delete folder: ' + e.message);
  }
}

// Recipe add
function openAddRecipe() {
  selectedFiles = [];
  document.getElementById('photoPreview').style.display = 'none';
  document.getElementById('photoInput').value = '';
  document.getElementById('uploadArea').querySelector('p').textContent = 'Tap to take photos or choose from library';
  document.getElementById('recipeNameInput').value = '';
  // Populate folder select
  const sel = document.getElementById('recipeFolderSelect');
  sel.innerHTML = recipeFolderOptionHtml(activeFolderId !== 'all' && activeFolderId !== 'none' ? activeFolderId : '');
  openModal('recipeModal');
}
function handleFiles(files) {
  const images = Array.from(files || []).filter(file => file.type.startsWith('image/')).slice(0, 8);
  if (!images.length) return;
  selectedFiles = images;
  const prev = document.getElementById('photoPreview');
  prev.src = URL.createObjectURL(images[0]);
  prev.style.display = 'block';
  const label = images.length === 1
    ? images[0].name
    : `${images.length} photos selected, first photo will be the cover`;
  document.getElementById('uploadArea').querySelector('p').textContent = label;
}
function handleDragOver(e) {
  e.preventDefault();
  document.getElementById('uploadArea').classList.add('drag');
}
function handleDrop(e) {
  e.preventDefault();
  document.getElementById('uploadArea').classList.remove('drag');
  handleFiles(e.dataTransfer.files);
}
async function saveRecipe() {
  if (!selectedFiles.length) { alert('Please choose at least one photo first.'); return; }
  const name = document.getElementById('recipeNameInput').value.trim() || 'Untitled Recipe';
  const folderId = document.getElementById('recipeFolderSelect').value;
  const saveButton = document.getElementById('recipeSaveButton');
  const fd = new FormData();
  selectedFiles.forEach(file => fd.append('photos', file));
  fd.append('name', name);
  if (folderId) fd.append('folderId', folderId);
  saveButton.disabled = true;
  saveButton.textContent = 'Reading...';
  try {
    const r = await fetch('/api/recipes', { method:'POST', body: fd });
    recipes.push(await readApiResponse(r));
    closeModal('recipeModal');
    refreshSearchOrRender();
  } catch (e) {
    alert('Could not save recipe: ' + e.message);
  } finally {
    saveButton.disabled = false;
    saveButton.textContent = 'Save';
  }
}

// Move
function openMove(id) {
  pendingMoveId = id;
  const sel = document.getElementById('moveFolderSelect');
  sel.innerHTML = recipeFolderOptionHtml();
  const r = recipes.find(x => x.id === id);
  if (r && r.folderId) sel.value = r.folderId;
  openModal('moveModal');
}
async function moveRecipe() {
  const folderId = document.getElementById('moveFolderSelect').value || null;
  try {
    const response = await fetch(`/api/recipes/${pendingMoveId}?folderId=${encodeURIComponent(folderId || '')}`, { method:'POST' });
    const updatedRecipe = await readApiResponse(response);
    const r = recipes.find(x => x.id === pendingMoveId);
    if (r) Object.assign(r, updatedRecipe);
    closeModal('moveModal');
    refreshSearchOrRender();
  } catch (e) {
    alert('Could not move recipe: ' + e.message);
  }
}

// Rename
function openRename(id, name) {
  pendingRenameId = id;
  document.getElementById('renameInput').value = name;
  openModal('renameModal');
}
async function doRename() {
  const name = document.getElementById('renameInput').value.trim();
  if (!name) return;
  try {
    const response = await fetch(`/api/recipes/${pendingRenameId}`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({name}) });
    const updatedRecipe = await readApiResponse(response);
    const r = recipes.find(x => x.id === pendingRenameId);
    if (r) Object.assign(r, updatedRecipe);
    closeModal('renameModal');
    refreshSearchOrRender();
  } catch (e) {
    alert('Could not rename recipe: ' + e.message);
  }
}

// Delete recipe
async function deleteRecipe(id) {
  if (!confirm('Delete this recipe photo?')) return;
  try {
    const response = await fetch(`/api/recipes/${id}`, { method:'DELETE' });
    await readApiResponse(response);
    recipes = recipes.filter(x => x.id !== id);
    refreshSearchOrRender();
  } catch (e) {
    alert('Could not delete recipe: ' + e.message);
  }
}

// Recipe detail
function renderList(items, ordered) {
  if (!Array.isArray(items) || !items.length) return '<p class="recipe-empty-text">No parsed text found.</p>';
  const tag = ordered ? 'ol' : 'ul';
  return `<${tag}>${items.map(item => `<li>${esc(item)}</li>`).join('')}</${tag}>`;
}
function linesFromList(items) {
  return Array.isArray(items) ? items.join('\n') : '';
}
function renderRecipeDetail(recipe) {
  const rawText = recipe.ocrText ? `<h3>Full Text</h3><pre>${esc(recipe.ocrText)}</pre>` : '';
  const status = recipe.ocrStatus === 'failed'
    ? `<p class="recipe-empty-text">Text scan failed${recipe.ocrError ? `: ${esc(recipe.ocrError)}` : ''}</p>`
    : '';
  document.getElementById('recipeTextPanel').innerHTML = `
    <div class="recipe-detail-head">
      <h2>${esc(recipe.name)}</h2>
      <div class="recipe-detail-actions">
        <button type="button" class="btn btn-secondary" onclick="startRecipeEdit()">Edit</button>
      </div>
    </div>
    ${status}
    <h3>Ingredients</h3>
    ${renderList(recipe.ingredients, false)}
    <h3>Steps</h3>
    ${renderList(recipe.steps, true)}
    ${rawText}
  `;
}
function renderRecipeEdit(recipe) {
  document.getElementById('recipeTextPanel').innerHTML = `
    <form class="recipe-edit-form" onsubmit="saveRecipeEdits(event)">
      <label>Name
        <input type="text" id="detailRecipeName" maxlength="80" value="${esc(recipe.name)}">
      </label>
      <label>Ingredients
        <textarea id="detailRecipeIngredients" spellcheck="true" placeholder="One ingredient per line">${esc(linesFromList(recipe.ingredients))}</textarea>
      </label>
      <label>Steps
        <textarea id="detailRecipeSteps" spellcheck="true" placeholder="One direction per line">${esc(linesFromList(recipe.steps))}</textarea>
      </label>
      <label>Full Text
        <textarea id="detailRecipeOcrText" class="full-text" spellcheck="true">${esc(recipe.ocrText || '')}</textarea>
      </label>
      <div class="recipe-edit-actions">
        <button type="button" class="btn btn-secondary" onclick="cancelRecipeEdit()">Cancel</button>
        <button type="submit" class="btn btn-primary" id="detailRecipeSaveButton">Save</button>
      </div>
    </form>
  `;
  document.getElementById('detailRecipeName').focus();
}
function openRecipe(id) {
  const recipe = recipes.find(r => r.id === id);
  if (!recipe) return;
  activeRecipeDetailId = id;
  document.getElementById('lightboxImg').src = `/uploads/${recipe.filename}`;
  renderRecipeDetail(recipe);
  document.getElementById('lightbox').classList.remove('hidden');
}
function startRecipeEdit() {
  const recipe = recipes.find(r => r.id === activeRecipeDetailId);
  if (recipe) renderRecipeEdit(recipe);
}
function cancelRecipeEdit() {
  const recipe = recipes.find(r => r.id === activeRecipeDetailId);
  if (recipe) renderRecipeDetail(recipe);
}
async function saveRecipeEdits(event) {
  event.preventDefault();
  if (savingRecipeEdits || !activeRecipeDetailId) return;
  const saveButton = document.getElementById('detailRecipeSaveButton');
  const name = document.getElementById('detailRecipeName').value.trim();
  if (!name) { alert('Recipe name is required.'); return; }
  savingRecipeEdits = true;
  saveButton.disabled = true;
  saveButton.textContent = 'Saving...';
  try {
    const response = await fetch(`/api/recipes/${activeRecipeDetailId}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        name,
        ingredients: document.getElementById('detailRecipeIngredients').value,
        steps: document.getElementById('detailRecipeSteps').value,
        ocrText: document.getElementById('detailRecipeOcrText').value
      })
    });
    const updatedRecipe = await readApiResponse(response);
    const idx = recipes.findIndex(r => r.id === activeRecipeDetailId);
    if (idx >= 0) recipes[idx] = updatedRecipe;
    renderRecipeDetail(updatedRecipe);
    refreshSearchOrRender();
  } catch (e) {
    alert('Could not save recipe edits: ' + e.message);
    saveButton.disabled = false;
    saveButton.textContent = 'Save';
  } finally {
    savingRecipeEdits = false;
  }
}
function closeLightbox() {
  document.getElementById('lightbox').classList.add('hidden');
  activeRecipeDetailId = null;
}
document.getElementById('lightboxPhoto').addEventListener('mousemove', e => {
  const rect = e.currentTarget.getBoundingClientRect();
  e.currentTarget.style.setProperty('--zoom-x', `${((e.clientX - rect.left) / rect.width) * 100}%`);
  e.currentTarget.style.setProperty('--zoom-y', `${((e.clientY - rect.top) / rect.height) * 100}%`);
});

// Modal helpers
function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
document.querySelectorAll('.overlay').forEach(o => o.addEventListener('click', e => { if (e.target === o) o.classList.add('hidden'); }));
document.addEventListener('keydown', e => { if (e.key === 'Escape') { document.querySelectorAll('.overlay:not(.hidden),.lightbox:not(.hidden)').forEach(m => m.classList.add('hidden')); }});

// Enter key in modals
document.getElementById('folderNameInput').addEventListener('keydown', e => { if (e.key==='Enter') saveFolder(); });
document.getElementById('folderSaveButton').addEventListener('click', saveFolder);
document.getElementById('recipeSearchInput').addEventListener('input', e => {
  searchQuery = e.target.value;
  scheduleSearch();
});
document.getElementById('recipeNameInput').addEventListener('keydown', e => { if (e.key==='Enter') saveRecipe(); });
document.getElementById('renameInput').addEventListener('keydown', e => { if (e.key==='Enter') doRename(); });
document.getElementById('inlineFolderName').addEventListener('keydown', e => { if (e.key==='Enter') createInlineFolder(); });

function toggleInlineNewFolder() {
  const box = document.getElementById('inlineNewFolder');
  const showing = box.style.display !== 'none';
  box.style.display = showing ? 'none' : 'block';
  if (!showing) { document.getElementById('inlineFolderName').value = ''; document.getElementById('inlineFolderName').focus(); }
}
function cancelInlineFolder() {
  document.getElementById('inlineNewFolder').style.display = 'none';
  document.getElementById('inlineFolderName').value = '';
}
async function createInlineFolder() {
  const name = document.getElementById('inlineFolderName').value.trim();
  if (!name) return;
  try {
    const r = await fetch(`/api/folders?name=${encodeURIComponent(name)}`, { method:'POST' });
    const f = await readApiResponse(r);
    folders.push(f);
    folders = getSortedFolders();
    const sel = document.getElementById('recipeFolderSelect');
    sel.innerHTML = recipeFolderOptionHtml();
    sel.value = f.id;
    cancelInlineFolder();
  } catch (e) {
    alert('Could not save folder: ' + e.message);
  }
}
function esc(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

init();
</script>
</body>
</html>
